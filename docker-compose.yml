version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: yami-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - yami-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: yami-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - yami-network

  docmost-db:
    image: postgres:16-alpine
    container_name: yami-docmost-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: docmost123
    volumes:
      - docmost_db_data:/var/lib/postgresql/data
    networks:
      - yami-network

  docmost:
    image: docmost/docmost:latest
    container_name: yami-docmost
    restart: unless-stopped
    ports:
      - '3002:3000' 
    environment:
      APP_URL: http://localhost:3002 
      DATABASE_URL: postgresql://docmost:docmost123@yami-docmost-db:5432/docmost
      REDIS_URL: redis://yami-redis:6379
      APP_SECRET: changeme-docmost-secret-32chars-min
    depends_on:
      - docmost-db
      - redis
    volumes:
      - docmost_data:/app/data
    networks:
      - yami-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yami-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./backend/.env
    environment:
      # 💡 LOCAL TRANSACTION LOGGING: Prisma targets your Mac's host MySQL instance
      DATABASE_URL: mysql://yami:yami123@host.docker.internal:3306/yami
      
      # 💡 DIRECT INJECTION BRIDGE: Expose Docmost's Postgres network path directly to Node
      DOCMOST_DB_URL: postgresql://docmost:docmost123@yami-docmost-db:5432/docmost
      DOCMOST_DEFAULT_SPACE_ID: 019ed1aa-e259-7a4e-a982-c792fc7d57e4
      REDIS_URL: redis://yami-redis:6379
      QDRANT_URL: http://yami-qdrant:6333       
      DOCMOST_URL: http://yami-docmost:3000     
      FRONTEND_URL: http://localhost:3000     
    depends_on:
      - redis
      - qdrant
      - docmost
      - docmost-db
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - yami-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yami-frontend
    restart: unless-stopped
    ports:
      - '3000:3000' 
    depends_on:
      - backend
    networks:
      - yami-network

volumes:
  redis_data:
  qdrant_data:
  docmost_db_data:
  docmost_data:

networks:
  yami-network:
    driver: bridge